# ============================================================
# EduSync - Configuração da aplicação
# Valores sensíveis são lidos de variáveis de ambiente (com fallback
# para desenvolvimento).
# ============================================================

spring.application.name=edusync-backend
server.port=${SERVER_PORT:8080}

# ------------------------------------------------------------
# Datasource - PostgreSQL
# ------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/edusync}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ------------------------------------------------------------
# JPA / Hibernate
# ------------------------------------------------------------
# 'update' facilita o desenvolvimento; em produção prefira Flyway/Liquibase.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ------------------------------------------------------------
# Segurança - JWT
# jwt.secret deve ser uma chave Base64 com >= 256 bits (32 bytes).
# ------------------------------------------------------------
edusync.jwt.secret=${JWT_SECRET}
# Tempo de expiração do access token em milissegundos (padrão: 24h)
edusync.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
edusync.jwt.issuer=${JWT_ISSUER:edusync}

# ------------------------------------------------------------
# Integração Google Gemini (IA Generativa)
# ------------------------------------------------------------
edusync.gemini.api-key=${GEMINI_API_KEY}
edusync.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
edusync.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
edusync.gemini.timeout-seconds=${GEMINI_TIMEOUT_SECONDS:30}

# ------------------------------------------------------------
# Logging
# ------------------------------------------------------------
logging.level.org.springframework.security=INFO
logging.level.com.edusync=DEBUG
